<!DOCTYPE html>
<html dir="ltr" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Serviços - Apex Tech Metais</title>
    <meta name="description" content="Nossas soluções para indústrias, sucatas, conectores, fios e cabos. Processamento sustentável e descarte certificado.">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://apextechmetais.com.br/wp-content/uploads/2024/07/logo-apextech.svg">
    <link rel="shortcut icon" href="https://apextechmetais.com.br/wp-content/uploads/2024/07/logo-apextech.svg">
    <link rel="apple-touch-icon" href="https://apextechmetais.com.br/wp-content/uploads/2024/07/logo-apextech.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=6">
    <script>window.CURRENT_PAGE = 'servicos';</script>
    <script src="partials.js"></script>
</head>
<body>

<div id="page-content" style="padding-top: var(--header-height);">

    <!-- SOLUÇÕES SECTION -->
    <section id="solucoes" class="section-solucoes">
        <div class="container">
            <h2 class="titulo_section_solucoes text-center">Nossas soluções</h2>
            <h3 class="titulo_section_40 text-center">Atendemos diversas indústrias, fornecendo soluções inovadoras e eficientes para a gestão de seus resíduos</h3>

            <div class="loop_solucao" id="solucoes-container">
                <div style="grid-column:span 4;padding:40px;text-align:center;"><i class="fa-solid fa-spinner fa-spin"></i> Carregando soluções...</div>
            </div>
        </div>
    </section>

    <!-- Solution Detail Lightbox Modal -->
    <div id="solution-modal" class="catalog-modal" role="dialog" aria-modal="true" aria-label="Detalhes da Solução">
        <div class="catalog-modal-overlay" id="solution-modal-overlay"></div>
        <div class="catalog-modal-content">
            <button class="catalog-modal-close" id="solution-modal-close" aria-label="Fechar">&times;</button>
            <div class="catalog-modal-body">
                <div class="catalog-modal-img-wrap" style="background: #0A1C11; padding: 40px; display: flex; align-items: center; justify-content: center;">
                    <img id="solution-modal-img" src="" alt="Ícone da Solução" style="width: 150px; height: 150px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(42,208,122,0.3));">
                </div>
                <div class="catalog-modal-info">
                    <span class="catalog-modal-badge"><i class="fa-solid fa-industry"></i> Solução</span>
                    <h3 id="solution-modal-title"></h3>
                    <p id="solution-modal-desc"></p>
                    <a href="/contato.html" class="catalog-modal-cta" onclick="document.getElementById('solution-modal').classList.remove('open')">
                        <i class="fa-brands fa-whatsapp"></i> Falar com Especialista
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="script.js?v=6"></script>
</body>
</html>
